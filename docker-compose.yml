services:
  db:
    image: postgres:16-alpine
    container_name: personal-me-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: personal_me
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d personal_me"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: personal-me-backend
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgresql+psycopg://app:app@db:5432/personal_me
      JWT_SECRET_KEY: super-secret-change-me
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      PASSWORD_RESET_EXPIRE_MINUTES: 30
      INITIAL_ADMIN_USERNAME: admin
      INITIAL_ADMIN_PASSWORD: admin123
      ALLOW_REGISTRATION: "true"
      COOKIE_SECURE: "false"
      OIDC_ISSUER: http://localhost/api/v1/oidc
      OIDC_FRONTEND_BASE_URL: http://localhost
      OIDC_AUTO_APPROVE: "true"
      INTEGRATIONS_JSON: '{"grafana":{"url":"http://localhost:3001","requires_auth":true,"use_sso":true,"label":"Grafana"},"portainer":{"url":"http://localhost:9000","requires_auth":true,"label":"Portainer"}}'
      INITIAL_ADMIN_EMAIL: admin@localhost
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@localhost
      SMTP_USE_TLS: "false"
      EXPOSE_RESET_TOKEN: "false"
    depends_on:
      db:
        condition: service_healthy
      mailpit:
        condition: service_started
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: personal-me-frontend
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE_URL: ""
      NUXT_API_INTERNAL_URL: http://backend:8000
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: personal-me-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

  mailpit:
    image: axllent/mailpit:latest
    container_name: personal-me-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  postgres_data:
