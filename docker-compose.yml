version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: personal-me-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: personal_me
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    container_name: personal-me-backend
    restart: unless-stopped
    environment:
      POSTGRES_DSN: postgresql+psycopg://app:app@db:5432/personal_me
      JWT_SECRET_KEY: super-secret-change-me
      ACCESS_TOKEN_EXPIRE_MINUTES: 120
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      INITIAL_ADMIN_USERNAME: admin
      INITIAL_ADMIN_PASSWORD: admin123
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: personal-me-frontend
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE_URL: http://nginx
    depends_on:
      - backend
    ports:
      - "3000:3000"

  nginx:
    image: nginx:1.27-alpine
    container_name: personal-me-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
